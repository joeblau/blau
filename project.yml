name: blau
options:
  bundleIdPrefix: app.blau
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEVELOPMENT_TEAM: K78G42H4U2

targets:
  Pilot:
    type: application
    platform: macOS
    sources:
      - Sources/Pilot
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.pilot
        PRODUCT_NAME: Pilot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        CODE_SIGN_ENTITLEMENTS: Sources/Pilot/Pilot.entitlements
        GENERATE_INFOPLIST_FILE: true
        OTHER_LDFLAGS: ["-lc++", "-framework", "Metal", "-framework", "QuartzCore", "-framework", "CoreText", "-framework", "IOKit", "-framework", "CoreGraphics", "-framework", "Foundation", "-framework", "Carbon", "-framework", "CoreFoundation", "-framework", "AppKit", "-framework", "CoreServices"]

  Copilot:
    type: application
    platform: iOS
    sources:
      - Sources/Copilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.copilot
        PRODUCT_NAME: Copilot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: Wingman Watch App

  Wingman Watch App:
    type: application
    platform: watchOS
    sources:
      - Sources/Wingman/Wingman Watch App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.copilot.watchkitapp
        PRODUCT_NAME: Wingman
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: app.blau.copilot
        GENERATE_INFOPLIST_FILE: true
        SDKROOT: watchos
