<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Pilot for macOS: a sidebar of workspaces beside split panes — a terminal showing a code diff and an agent run, a browser with a live price chart, a dev-server terminal, and a GitHub Actions activity feed.">
