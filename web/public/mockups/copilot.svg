<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 910" role="img" aria-label="Copilot on iPhone: a workspace list mirrored from Pilot with an on-screen trackpad at the bottom.">
  <defs>
    <style>
      .scr{fill:#0B0B0F}
      .t{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif}
      .tm{font-family:ui-monospace,'SF Mono',monospace}
      .pri{fill:#EDEDF2}.sec{fill:#8a8a95}.dim{fill:#5a5a64}
      .amber{fill:#FF9A4D}.green{fill:#3DDC84}
    </style>

    <linearGradient id="lg-surface" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.015"/>
    </linearGradient>
    <linearGradient id="lg-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.12" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.9" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="lg-sheen" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.18" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lg-amberglass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB877" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FF7A1A" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="lg-amberglow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#FF7A1A" stop-opacity="0.55"/><stop offset="1" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="lg-shadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/></filter>
    <filter id="lg-glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="16"/></filter>
    <radialGradient id="lg-gloss" cx="35%" cy="28%" r="65%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.12"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect class="scr" width="430" height="910"/>

  <!-- status bar -->
  <text class="tm pri" x="34" y="38" font-size="17" font-weight="600">6:33</text>
  <g fill="#EDEDF2">
    <rect x="338" y="26" width="3" height="8" rx="1"/><rect x="344" y="23" width="3" height="11" rx="1"/><rect x="350" y="20" width="3" height="14" rx="1"/><rect x="356" y="17" width="3" height="17" rx="1"/>
    <path d="M372 22 a8 8 0 0 1 11 0 l-5.5 6 z"/>
    <rect x="390" y="20" width="22" height="12" rx="3" fill="none" stroke="#EDEDF2" stroke-width="1.4"/><rect x="392" y="22" width="16" height="8" rx="1.5"/>
  </g>
  <!-- battery glass gloss -->
  <rect x="392" y="22" width="16" height="4" rx="1.5" fill="url(#lg-gloss)"/>

  <!-- title -->
  <text class="t pri" x="30" y="100" font-size="28" font-weight="700">Copilot</text>

  <!-- mac/watch glyph as a glass pill -->
  <rect x="330" y="78" width="34" height="24" rx="6" fill="url(#lg-surface)"/>
  <rect x="330" y="78" width="34" height="24" rx="6" fill="none" stroke="url(#lg-edge)" stroke-width="1"/>
  <rect x="336" y="84" width="22" height="12" rx="1.5" fill="#6a6a74"/>
  <rect x="336" y="84" width="22" height="5" rx="1.5" fill="url(#lg-gloss)"/>
  <!-- watch connection glyph -->
  <circle cx="392" cy="90" r="13" fill="url(#lg-surface)"/>
  <circle cx="392" cy="90" r="13" fill="#16161c" fill-opacity="0.6"/>
  <circle cx="392" cy="90" r="13" fill="none" stroke="url(#lg-edge)" stroke-width="1"/>
  <path d="M386 84 a8 8 0 1 1 0 12" fill="none" stroke="#8a8a95" stroke-width="1.6"/>
  <!-- green connection dot with glass gloss -->
  <circle cx="392" cy="90" r="4" class="green"/>
  <circle cx="391.2" cy="88.8" r="3.2" fill="url(#lg-gloss)"/>

  <!-- Pinned -->
  <text class="t dim" x="30" y="146" font-size="12" letter-spacing="0.5">Pinned</text>

  <!-- Pinned group: frosted glass card stack -->
  <g filter="url(#lg-shadow)">
    <rect x="20" y="158" width="390" height="92" rx="14" fill="url(#lg-surface)"/>
  </g>
  <rect x="20" y="158" width="390" height="92" rx="14" fill="none" stroke="url(#lg-edge)" stroke-width="1"/>
  <rect x="20" y="158" width="390" height="46" rx="14" fill="url(#lg-sheen)" opacity="0.5"/>
  <!-- row 1 -->
  <rect x="22" y="159" width="386" height="1" rx="0.5" fill="#ffffff" fill-opacity="0.14"/>
  <text class="t pri" x="34" y="186" font-size="15">Excalidraw</text>
  <!-- separator -->
  <rect x="34" y="202" width="376" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <!-- row 2 -->
  <text class="t pri" x="34" y="234" font-size="15">joeblau.com</text>

  <!-- Workspaces -->
  <text class="t dim" x="30" y="290" font-size="12" letter-spacing="0.5">Workspaces</text>

  <!-- Workspaces group: frosted glass card stack -->
  <g filter="url(#lg-shadow)">
    <rect x="20" y="356" width="390" height="188" rx="14" fill="url(#lg-surface)"/>
  </g>
  <rect x="20" y="356" width="390" height="188" rx="14" fill="none" stroke="url(#lg-edge)" stroke-width="1"/>
  <rect x="20" y="356" width="390" height="46" rx="14" fill="url(#lg-sheen)" opacity="0.45"/>

  <!-- highlighted: blau (Liquid Glass amber, floats above the group) -->
  <ellipse cx="160" cy="325" rx="150" ry="34" fill="url(#lg-amberglow)" filter="url(#lg-glow)" opacity="0.7"/>
  <rect x="20" y="302" width="390" height="46" rx="12" fill="url(#lg-amberglass)"/>
  <rect x="20" y="302" width="390" height="46" rx="12" fill="none" stroke="#FFB877" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="22" y="303" width="386" height="1" rx="0.5" fill="#FFB877" fill-opacity="0.5"/>
  <rect x="20" y="302" width="390" height="23" rx="12" fill="url(#lg-sheen)" opacity="0.4"/>
  <rect x="20" y="302" width="3" height="46" rx="1.5" fill="#FF7A1A"/>
  <text class="t amber" x="36" y="331" font-size="16" font-weight="600">blau</text>

  <!-- row: web (top of glass group) -->
  <rect x="22" y="357" width="386" height="1" rx="0.5" fill="#ffffff" fill-opacity="0.14"/>
  <text class="t pri" x="34" y="383" font-size="15">web</text>
  <!-- count badge: glossy glass pill -->
  <circle cx="80" cy="378" r="10" fill="#E5675F" fill-opacity="0.9"/>
  <circle cx="80" cy="378" r="10" fill="url(#lg-gloss)"/>
  <text class="t" x="80" y="382" font-size="11" font-weight="700" fill="#1a0606" text-anchor="middle">2</text>

  <!-- separator -->
  <rect x="34" y="400" width="376" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <!-- row: infra -->
  <text class="t pri" x="34" y="431" font-size="15">infra</text>

  <!-- separator -->
  <rect x="34" y="448" width="376" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <!-- row: api -->
  <text class="t pri" x="34" y="479" font-size="15">api</text>
  <!-- count badge: glossy glass pill -->
  <circle cx="74" cy="474" r="10" fill="#E5675F" fill-opacity="0.9"/>
  <circle cx="74" cy="474" r="10" fill="url(#lg-gloss)"/>
  <text class="t" x="74" y="478" font-size="11" font-weight="700" fill="#1a0606" text-anchor="middle">5</text>

  <!-- separator -->
  <rect x="34" y="496" width="376" height="1" fill="#ffffff" fill-opacity="0.06"/>
  <!-- row: submap.ai -->
  <text class="t pri" x="34" y="527" font-size="15">submap.ai</text>

  <!-- trackpad: large frosted glass panel -->
  <g filter="url(#lg-shadow)">
    <rect x="20" y="612" width="390" height="262" rx="22" fill="url(#lg-surface)"/>
  </g>
  <rect x="20" y="612" width="390" height="262" rx="22" fill="none" stroke="url(#lg-edge)" stroke-width="1"/>
  <rect x="20" y="612" width="390" height="120" rx="22" fill="url(#lg-sheen)" opacity="0.5"/>
  <rect x="20" y="612" width="390" height="262" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-dasharray="2 5"/>
  <text class="t dim" x="215" y="748" font-size="14" text-anchor="middle">Trackpad</text>
</svg>
