excluded:
  - fastlane
  - Frameworks
  - blau.xcodeproj

# Start with deterministic correctness/consistency checks. Length and
# complexity limits are intentionally generous and can be ratcheted down as
# touched files are decomposed. Suppressions require a reason at the narrowest
# scope; never disable a rule for the entire repository to land one change.
only_rules:
  - closing_brace
  - colon
  - comma
  - control_statement
  - cyclomatic_complexity
  - duplicate_imports
  - empty_count
  - empty_string
  - file_length
  - function_body_length
  - leading_whitespace
  - opening_brace
  - operator_usage_whitespace
  - return_arrow_whitespace
  - statement_position
  - syntactic_sugar
  - trailing_newline
  - trailing_semicolon
  - trailing_whitespace
  - type_body_length
  - unneeded_break_in_switch
  - unused_closure_parameter
  - unused_control_flow_label
  - unused_enumerated
  - unused_import
  - vertical_whitespace
  - void_return
  - weak_delegate
  - yoda_condition

cyclomatic_complexity:
  warning: 50
  error: 75
file_length:
  warning: 1500
  error: 2500
function_body_length:
  warning: 200
  error: 300
type_body_length:
  warning: 1000
  error: 1500

reporter: xcode
