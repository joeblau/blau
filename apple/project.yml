name: blau
options:
  bundleIdPrefix: app.blau
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
    watchOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEVELOPMENT_TEAM: K78G42H4U2
    # Work around XcodeGen/Xcode's iOS SwiftPM integration losing Jinja's
    # transitive OrderedCollections module search path.
    SWIFT_INCLUDE_PATHS:
      - "$(inherited)"
      - "$(BUILD_DIR)/../../swift-collections/build/$(CONFIGURATION)$(EFFECTIVE_PLATFORM_NAME)"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.18.0"

targets:
  Pilot:
    type: application
    platform: macOS
    sources:
      - Sources/Pilot
      - path: Sources/Shared
        # Audio capture + Whisper transcription live on Copilot now —
        # Pilot just receives the finished text over the sync channel.
        excludes:
          - "TranscriptionService.swift"
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.pilot
        PRODUCT_NAME: Pilot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: Sources/Pilot/Pilot.entitlements
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Sources/Pilot/Info.plist
        OTHER_LDFLAGS: ["-lc++", "-framework", "Metal", "-framework", "MetalKit", "-framework", "QuartzCore", "-framework", "CoreText", "-framework", "IOKit", "-framework", "IOSurface", "-framework", "CoreGraphics", "-framework", "Foundation", "-framework", "Carbon", "-framework", "CoreFoundation", "-framework", "AppKit", "-framework", "CoreServices", "-framework", "AVFoundation", "-framework", "CoreMedia", "-framework", "CoreMediaIO"]
      configs:
        # Debug builds ad-hoc sign ("-") with manual signing and no team, so
        # Pilot runs locally even on a machine without an Apple Development
        # identity for the team. Release keeps the automatic team signing from
        # the project-level base settings for distribution.
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          PROVISIONING_PROFILE_SPECIFIER: ""

  Copilot:
    type: application
    platform: iOS
    sources:
      - Sources/Copilot
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.copilot
        PRODUCT_NAME: Copilot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Sources/Copilot/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: Wingman Watch App
      - package: WhisperKit
        product: WhisperKit

  Plotter:
    type: application
    platform: iOS
    sources:
      - Sources/Plotter
      - path: Sources/Shared
        # Plotter mirrors + draws over the sync channel; it has no audio
        # capture, so the Whisper-backed transcription service is excluded.
        excludes:
          - "TranscriptionService.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.plotter
        PRODUCT_NAME: Plotter
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Sources/Plotter/Info.plist
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  Wingman Watch App:
    type: application
    platform: watchOS
    sources:
      - Sources/Wingman/Wingman Watch App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.copilot.watchkitapp
        PRODUCT_NAME: Wingman
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: app.blau.copilot
        GENERATE_INFOPLIST_FILE: true
        SDKROOT: watchos

  SharedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/SharedTests
    dependencies:
      - target: Copilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.copilot.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Copilot.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Copilot"
        BUNDLE_LOADER: "$(TEST_HOST)"

  PilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PilotTests
    dependencies:
      - target: Pilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.blau.pilot.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pilot.app/Contents/MacOS/Pilot"
        BUNDLE_LOADER: "$(TEST_HOST)"
