  The full-body robot's mirrored <use> refs, rotated antennae, ellipse dome and
  rounded-rect limbs are flattened into one filled path and fitted into the SF
  Symbols template (Template v.7.0) so it renders, scales, and baseline-aligns
  like a native SF Symbol beside the Pilot toolbar glyphs. The robot is a
  monoline mark, so the same artwork fills the Ultralight, Regular, and Black
  anchors; Xcode interpolates the remaining weights. The eyes are cut as
  reverse-wound holes; the white limb separators are dropped so the silhouette
  reads as a single tinted glyph.
-->
