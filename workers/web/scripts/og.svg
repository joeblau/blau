<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0" stop-color="#FF7A1A" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#FF7A1A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DDC84" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3DDC84" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#CFCFD6"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="630" fill="#08080A"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- inset hairline frame -->
  <rect x="24" y="24" width="1152" height="582" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- ============ LEFT: brand ============ -->
  <text x="96" y="150" font-family="Menlo, monospace" font-size="22" letter-spacing="4" fill="#FF9A4D">NATIVE APPLE DEV COCKPIT</text>

  <text x="92" y="312" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="168" font-weight="800" letter-spacing="-6" fill="url(#word)">blau</text>

  <text x="96" y="386" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#C9C9D2">Your terminal, browser, and devices —</text>
  <text x="96" y="432" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="500" fill="#C9C9D2">one cockpit, four screens.</text>

  <!-- platform chips -->
  <g font-family="Menlo, monospace" font-size="20" fill="#a9a9b4">
    <rect x="96"  y="486" width="120" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="156" y="515" text-anchor="middle">macOS</text>
    <rect x="228" y="486" width="86" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="271" y="515" text-anchor="middle">iOS</text>
    <rect x="326" y="486" width="122" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="387" y="515" text-anchor="middle">iPadOS</text>
    <rect x="460" y="486" width="134" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="527" y="515" text-anchor="middle">watchOS</text>
  </g>

  <!-- footer -->
  <circle cx="103" cy="572" r="5" fill="#3DDC84"/>
  <text x="118" y="578" font-family="Menlo, monospace" font-size="19" fill="#5e5e68">open source · github.com/joeblau/blau</text>

  <!-- ============ RIGHT: cockpit motif ============ -->
  <g transform="translate(706,150)">
    <rect x="0" y="0" width="430" height="330" rx="16" fill="#0C0C11" stroke="#ffffff" stroke-opacity="0.1"/>
    <!-- title bar -->
    <path d="M0 16 a16 16 0 0 1 16 -16 h398 a16 16 0 0 1 16 16 v22 h-430 z" fill="#15151b"/>
    <circle cx="22" cy="19" r="5.5" fill="#ff5f57"/><circle cx="42" cy="19" r="5.5" fill="#febc2e"/><circle cx="62" cy="19" r="5.5" fill="#28c840"/>
    <text x="92" y="24" font-family="Menlo, monospace" font-size="13" fill="#7a7a85">pilot — ~/dev</text>
    <line x1="0" y1="38" x2="430" y2="38" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- sidebar -->
    <rect x="0" y="38" width="92" height="292" fill="#0A0A0E"/>
    <line x1="92" y1="38" x2="92" y2="330" stroke="#ffffff" stroke-opacity="0.07"/>
    <rect x="14" y="64" width="50" height="6" rx="3" fill="#ffffff" fill-opacity="0.10"/>
    <rect x="8"  y="88" width="76" height="20" rx="5" fill="#FF7A1A" fill-opacity="0.14"/>
    <rect x="8"  y="90" width="2.5" height="16" rx="1" fill="#FF7A1A"/>
    <rect x="18" y="96" width="48" height="6" rx="3" fill="#FF9A4D"/>
    <rect x="14" y="124" width="60" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="14" y="148" width="52" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="14" y="172" width="64" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>

    <!-- terminal column -->
    <rect x="104" y="58" width="120" height="9" rx="2" fill="#E5675F" fill-opacity="0.5"/>
    <rect x="104" y="76" width="150" height="9" rx="2" fill="#E5675F" fill-opacity="0.5"/>
    <rect x="104" y="94" width="90"  height="9" rx="2" fill="#3DDC84" fill-opacity="0.45"/>
    <rect x="104" y="120" width="140" height="7" rx="2" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="104" y="138" width="110" height="7" rx="2" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="104" y="156" width="130" height="7" rx="2" fill="#ffffff" fill-opacity="0.08"/>

    <!-- chart -->
    <path d="M250 300 L280 280 L300 288 L325 250 L350 262 L375 224 L400 206 L420 188 L420 318 L250 318 Z" fill="url(#chart)"/>
    <path d="M250 300 L280 280 L300 288 L325 250 L350 262 L375 224 L400 206 L420 188" fill="none" stroke="#3DDC84" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- BTC pill -->
    <rect x="250" y="120" width="118" height="30" rx="15" fill="#0E0E13" stroke="#ffffff" stroke-opacity="0.1"/>
    <circle cx="269" cy="135" r="9" fill="#F7931A"/>
    <text x="284" y="140" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#EDEDF2">$67,348</text>
  </g>
</svg>
