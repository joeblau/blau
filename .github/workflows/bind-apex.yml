name: Bind blau.app apex to blau-web (one-time)

# One-shot cutover: delete the old GitHub Pages A records on the blau.app
# apex, then attach blau.app as a custom domain on the blau-web Worker.
# (Cloudflare rejects the attach while externally-managed A records exist —
# error 100117 — so they must be removed first.) After this runs once, the
# regular Deploy to Cloudflare workflow binds the domain on its own, so this
# file can be deleted. Dispatch manually.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - name: Cut blau.app over from GitHub Pages to blau-web
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          base="https://api.cloudflare.com/client/v4"
          api() { curl -sS -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" "$@"; }

          ZONE_ID=$(api "$base/zones?name=blau.app" | jq -r '.result[0].id')
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "::error::Could not resolve the blau.app zone"; exit 1
          fi
          echo "zone_id=$ZONE_ID"

          echo "== Deleting GitHub Pages A records on the apex (185.199.x.153) =="
          ids=$(api "$base/zones/$ZONE_ID/dns_records?type=A&name=blau.app" \
                | jq -r '.result[] | select(.content | startswith("185.199.")) | .id')
          if [ -z "$ids" ]; then
            echo "(none found — already removed)"
          else
            for id in $ids; do
              echo "deleting A record $id"
              ok=$(api -X DELETE "$base/zones/$ZONE_ID/dns_records/$id" | jq -r '.success')
              [ "$ok" = "true" ] || { echo "::error::failed to delete A record $id"; exit 1; }
            done
          fi

          echo "== Attaching blau.app -> blau-web =="
          RESP=$(api -X PUT "$base/accounts/$CF_ACCOUNT_ID/workers/domains" \
            --data "{\"environment\":\"production\",\"hostname\":\"blau.app\",\"service\":\"blau-web\",\"zone_id\":\"$ZONE_ID\"}")
          echo "$RESP" | jq -c '{success, errors}'
          if [ "$(echo "$RESP" | jq -r '.success')" != "true" ]; then
            echo "::error::Custom-domain attach failed (see response above)"; exit 1
          fi
          echo "✅ blau.app is now served by the blau-web Worker"
