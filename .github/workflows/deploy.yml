name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths: ['workers/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Decide which workers changed so we only redeploy what moved. A manual
  # workflow_dispatch run deploys both (see the job `if:` conditions).
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      rendezvous: ${{ steps.filter.outputs.rendezvous }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'workers/web/**'
            rendezvous:
              - 'workers/rendezvous/**'

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
        working-directory: workers/web
      - name: Build site
        run: bun run build
        working-directory: workers/web
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/web
          command: deploy

  rendezvous:
    needs: changes
    if: ${{ needs.changes.outputs.rendezvous == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # wrangler-action uses the repo's package manager to install wrangler; the
      # rendezvous worker has a bun.lock, so bun must be on the runner.
      - uses: oven-sh/setup-bun@v2
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/rendezvous
          command: deploy
