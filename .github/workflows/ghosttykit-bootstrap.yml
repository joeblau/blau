name: GhosttyKit 1.3.1-blau.2 Bootstrap

on:
  push:
    branches:
      - agent/build-ghosttykit-1.3.1-blau.2
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ghosttykit-1.3.1-blau.2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify supported Xcode
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26\.'
      - name: Install pinned Zig 0.15.2
        shell: bash
        run: |
          test "$(uname -m)" = arm64
          # Homebrew revision 1 carries the upstream-compatible Darwin target
          # matcher fix needed for Xcode 26.4+ arm64e TBD files. Build the
          # exact formula from homebrew/core commit 66277812877b so it links
          # against the runner's matching LLVM dylibs rather than stale bottle
          # dependencies.
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew tap-new blau/pinned
          formula="$(brew --repository blau/pinned)/Formula/zig.rb"
          curl -fsSL \
            'https://raw.githubusercontent.com/Homebrew/homebrew-core/66277812877bd6b470da86a59208ef0be903ca0c/Formula/z/zig.rb' \
            -o "$formula"
          echo '91e0a69da295d32f65938042255de5199ebc83602d5b87a517acad1bb3ec9829  '"$formula" | shasum -a 256 -c -
          brew install --build-from-source blau/pinned/zig
          echo "$(brew --prefix blau/pinned/zig)/bin" >> "$GITHUB_PATH"
      - name: Record pinned Zig toolchain
        run: |
          provenance="$RUNNER_TEMP/ghosttykit-zig-toolchain.json"
          second="$RUNNER_TEMP/ghosttykit-zig-toolchain-second.json"
          apple/bin/write-ghosttykit-zig-provenance.sh "$provenance"
          apple/bin/write-ghosttykit-zig-provenance.sh "$second"
          cmp "$provenance" "$second"
          jq . "$provenance"
          echo "GHOSTTYKIT_ZIG_PROVENANCE_FILE=$provenance" >> "$GITHUB_ENV"
      - name: Build twice from fresh source
        run: |
          zig version
          apple/bin/package-ghosttykit.sh build "$RUNNER_TEMP/ghostty-one"
          apple/bin/package-ghosttykit.sh build "$RUNNER_TEMP/ghostty-two"
      - name: Verify reproducibility and provenance
        env:
          EXPECTED_REVISION: ${{ github.sha }}
        run: |
          for asset in \
            GhosttyKit.xcframework.zip \
            GhosttyKit.symbols.zip \
            LICENSE.ghostty \
            GhosttyKit.release.json \
            GhosttyKit.checksums.txt; do
            cmp "$RUNNER_TEMP/ghostty-one/$asset" "$RUNNER_TEMP/ghostty-two/$asset"
          done
          cd "$RUNNER_TEMP/ghostty-one"
          shasum -a 256 -c GhosttyKit.checksums.txt
          test "$(jq -r .packagingRevision GhosttyKit.release.json)" = "$EXPECTED_REVISION"
          jq -e '.xcodeVersion | startswith("Xcode 26.")' GhosttyKit.release.json
          jq -e '.requiredXcodeMajorVersion == "26"' GhosttyKit.release.json
          jq -e '.zigToolchain.version == "0.15.2_1"' GhosttyKit.release.json
          jq -e '.zigToolchain.formulaGitRevision == "66277812877bd6b470da86a59208ef0be903ca0c"' GhosttyKit.release.json
          jq -e '.validation.linkedConsumers | length == 4' GhosttyKit.release.json
      - name: Upload release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ghosttykit-1.3.1-blau.2
          path: |
            ${{ runner.temp }}/ghostty-one/GhosttyKit.xcframework.zip
            ${{ runner.temp }}/ghostty-one/GhosttyKit.symbols.zip
            ${{ runner.temp }}/ghostty-one/LICENSE.ghostty
            ${{ runner.temp }}/ghostty-one/GhosttyKit.release.json
            ${{ runner.temp }}/ghostty-one/GhosttyKit.checksums.txt
          compression-level: 0
          retention-days: 7
          if-no-files-found: error
