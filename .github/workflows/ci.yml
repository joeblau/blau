name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apple: ${{ steps.filter.outputs.apple }}
      workers: ${{ steps.filter.outputs.workers }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            apple:
              - 'apple/**'
            workers:
              - 'workers/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - 'eslint.config.js'

  workers:
    needs: changes
    if: needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run ci

  apple-lint:
    needs: changes
    if: needs.changes.outputs.apple == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Verify supported toolchain
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26\.'
      - name: Lint changed Swift
        run: apple/bin/lint-swift.sh --changed origin/${{ github.base_ref }}

  apple-build-test:
    needs: changes
    if: needs.changes.outputs.apple == 'true'
    runs-on: macos-26
    env:
      BLAU_SOURCE_PACKAGES: ${{ github.workspace }}/apple/.ci-source-packages
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify supported toolchain
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26\.'
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: apple/.ci-source-packages
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-xcode26-${{ hashFiles('apple/blau.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
      - name: Verify generated Xcode project
        run: |
          apple/bin/install-xcodegen.sh generate --spec apple/project.yml --project apple
          git diff --exit-code -- apple/blau.xcodeproj
      - name: Compile every application
        run: apple/bin/build-ci.sh
      - name: Run unit tests
        run: apple/bin/test.sh all

  complete:
    if: always()
    needs: [changes, workers, apple-lint, apple-build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Require every selected gate
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          case " $RESULTS " in
            *" failure "*|*" cancelled "*) exit 1 ;;
          esac
          echo "Selected CI gates passed: $RESULTS"
