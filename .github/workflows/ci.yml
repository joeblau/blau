name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apple: ${{ steps.filter.outputs.apple }}
      docs: ${{ steps.filter.outputs.docs }}
      workers: ${{ steps.filter.outputs.workers }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            apple:
              - 'apple/**'
              - '.github/workflows/ci.yml'
            docs:
              - '**/*.md'
              - 'bin/check-docs.sh'
              - '.github/workflows/ci.yml'
            workers:
              - 'workers/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - 'eslint.config.js'
              - '.github/workflows/ci.yml'

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: bin/check-docs.sh

  workers:
    needs: changes
    if: needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run ci

  apple-lint:
    needs: changes
    if: needs.changes.outputs.apple == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify supported toolchain
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26\.'
      - name: Lint changed Swift
        run: apple/bin/lint-swift.sh --changed origin/${{ github.base_ref }}

  apple-build-test:
    needs: changes
    if: needs.changes.outputs.apple == 'true'
    runs-on: macos-26
    env:
      BLAU_SOURCE_PACKAGES: ${{ github.workspace }}/apple/.ci-source-packages
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - name: Verify supported toolchain
        run: |
          xcodebuild -version
          xcodebuild -version | grep -E '^Xcode 26\.'
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apple/.ci-source-packages
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-xcode26-${{ hashFiles('apple/blau.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
      - name: Validate application icons
        run: apple/bin/app-icon-tool.swift validate
      - name: Verify generated Xcode project
        run: |
          apple/bin/install-xcodegen.sh generate --spec apple/project.yml --project apple
          git diff --exit-code -- apple/blau.xcodeproj
      - name: Compile every application
        run: apple/bin/build-ci.sh
      - name: Run unit tests
        run: apple/bin/test.sh all

  complete:
    if: always()
    needs: [changes, docs, workers, apple-lint, apple-build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Require every selected gate
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          case " $RESULTS " in
            *" failure "*|*" cancelled "*) exit 1 ;;
          esac
          echo "Selected CI gates passed: $RESULTS"
